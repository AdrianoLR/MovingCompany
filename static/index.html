<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moving Company Booking</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/index.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4">
        <h1 class="text-3xl font-bold text-center my-8">Furniture Man Booking</h1>
        
        <!-- Notification -->
        <div id="notification" class="notification"></div>
        
        <!-- Booking Form -->
        <div class="booking-form bg-white">
            <h2 class="text-2xl font-bold mb-4">Create New Booking</h2>
            <form id="bookingForm" class="space-y-4">
                <!-- Hidden token fields -->
                <input type="hidden" id="tokenId" name="token_id" value="{{.TokenID}}">
                <input type="hidden" id="token" name="token" value="{{.TokenString}}">
                <div class="form-group">
                    <label for="customer_name">Customer Name</label>
                    <input type="text" id="customer_name" name="customer_name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>
                <div class="form-group">
                    <label for="pickup_address">Pickup Address</label>
                    <input type="text" id="pickup_address" name="pickup_address" required>
                </div>
                <div class="form-group">
                    <label for="drop_address">Drop Address</label>
                    <input type="text" id="drop_address" name="drop_address" required>
                </div>
                <div class="form-group">
                    <label for="pickup_date">Pickup Date</label>
                    <input type="datetime-local" id="pickup_date" name="pickup_date" required>
                </div>

                <!-- Furniture Section -->
                <div class="furniture-section">
                    <h3 class="text-xl">Furniture Items</h3>
                    <div class="furniture-grid">
                        <div class="form-group">
                            <label for="chairs">Chairs</label>
                            <input type="number" id="chairs" name="chairs" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="table_2_seats">Table (2 seats)</label>
                            <input type="number" id="table_2_seats" name="table_2_seats" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="table_3_seats">Table (3 seats)</label>
                            <input type="number" id="table_3_seats" name="table_3_seats" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="table_4_plus_seats">Table (4+ seats)</label>
                            <input type="number" id="table_4_plus_seats" name="table_4_plus_seats" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="fridges">Fridges</label>
                            <input type="number" id="fridges" name="fridges" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="washing_machines">Washing Machines</label>
                            <input type="number" id="washing_machines" name="washing_machines" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="dryers">Dryers</label>
                            <input type="number" id="dryers" name="dryers" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="dishwashers">Dishwashers</label>
                            <input type="number" id="dishwashers" name="dishwashers" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="boxes">Boxes</label>
                            <input type="number" id="boxes" name="boxes" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="pot_plants">Pot Plants</label>
                            <input type="number" id="pot_plants" name="pot_plants" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="mattresses">Mattresses</label>
                            <input type="number" id="mattresses" name="mattresses" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="bed_frames">Bed Frames</label>
                            <input type="number" id="bed_frames" name="bed_frames" min="0" value="0">
                        </div>
                        <div class="form-group">
                            <label for="sofas">Sofas</label>
                            <input type="number" id="sofas" name="sofas" min="0" value="0">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn w-full">Create Booking</button>
            </form>
        </div>
    </div>

    <script src="/static/js/index.js"></script>
</body>
</html>
