<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Moving Company</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body class="bg-gray-100">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold mb-8">Admin Dashboard</h1>

        <!-- Generate Booking Link Section -->
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-2xl font-bold mb-4">Generate Booking Link</h2>
            <div class="mb-4">
                <label for="customer-email" class="block text-sm font-medium text-gray-700 mb-2">Customer Email</label>
                <div class="flex">
                    <input type="text" id="link"
                           class="flex-1 p-2 border rounded-l focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="Generate link">
                    <button onclick="generateBookingLink()"
                            class="bg-blue-600 text-white px-4 py-2 rounded-r hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                        Generate Link
                    </button>
                </div>
            </div>
            <div class="mb-4">
                <div class="flex">
                    <button onclick="generateInvoice()"
                            class="bg-green-600 text-white px-4 py-2 rounded-r hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">
                        Generate Invoice
                    </button>
                </div>
            </div>
            <div id="link-result" class="mt-4 p-4 bg-gray-50 rounded hidden">
                <div class="flex items-center">
                    <label class="font-medium text-gray-700 mr-2">Booking Link:</label>
                    <input type="text" id="booking-link" readonly
                           class="flex-1 p-2 border rounded-l bg-white"
                           onclick="this.select()">
                    <button onclick="copyToClipboard('booking-link')"
                            class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-r">
                        Copy
                    </button>
                </div>
                <p class="mt-2 text-sm text-gray-500">This link will expire in 24 hours.</p>
            </div>
        </div>

        <!-- Bookings Table -->
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-2xl font-bold mb-4">Bookings Management</h2>
            <div class="mb-4 flex items-center">
                <label for="sort-bookings" class="mr-2 font-medium">Sort by:</label>
                <select id="sort-bookings" class="p-2 border rounded" onchange="handleSortChange()">
                    <option value="name">Customer Name (A-Z)</option>
                    <option value="status">Status</option>
                </select>
            </div>
            <div class="overflow-x-auto">
                <div id="bookings-table"
                     hx-get="/api/bookings/"
                     hx-trigger="load"
                     hx-swap="innerHTML">
                    <p>Loading bookings...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Invoice Details Modal -->
    <div id="invoiceModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl p-6 w-96">
            <h3 class="text-lg font-bold mb-4">Invoice Details</h3>
            <form id="invoiceForm">
                <div class="mb-4">
                    <label for="totalAmount" class="block text-sm font-medium text-gray-700 mb-2">Total Amount (AUD)</label>
                    <input type="number" id="totalAmount" step="0.01" min="0"
                           class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="340.00" required>
                </div>
                <div class="mb-4">
                    <label for="hoursUsed" class="block text-sm font-medium text-gray-700 mb-2">Hours Used</label>
                    <input type="number" id="hoursUsed" step="0.5" min="0"
                           class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                           placeholder="2.0" required>
                </div>
                <div class="mb-4">
                    <label for="jobDescription" class="block text-sm font-medium text-gray-700 mb-2">Job Description (Optional)</label>
                    <textarea id="jobDescription" rows="3"
                              class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                              placeholder="Flat pack delivery no required assembly"></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeInvoiceModal()"
                            class="px-4 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400">
                        Cancel
                    </button>
                    <button type="submit"
                            class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700">
                        Generate Invoice
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
